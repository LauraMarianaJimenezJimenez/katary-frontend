<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Katary Renta Temporal | Panel de Registros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Access Control - Redirect if access code is missing or invalid
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('access') !== 'katary2025') {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-light: #F8F7F4;
            --bg-secondary: #EEE8DF;
            --primary: #7A7A7A;
            --accent: #C47A5A;
            --text-dark: #3A3A3A;
            --text-light: #6B7280;
            --white: #FFFFFF;
            --border: #D1D5DB;
            --error: #DC2626;
            --success: #059669;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        h4 {
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        p {
            margin-bottom: 1rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section {
            padding: 40px 0;
            flex: 1;
        }

        .text-center {
            text-align: center;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--accent);
            color: var(--white);
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            text-align: center;
            margin-top: 24px;
            transition: var(--transition);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Header */
        header {
            background: var(--primary);
            color: var(--white);
            padding: 20px 0;
            text-align: center;
            font-weight: 700;
            font-size: 1.25rem;
        }

        /* Admin Panel Styles */
        .admin-container {
            background: var(--white);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-top: 20px;
        }

        @media (min-width: 768px) {
            .admin-container {
                padding: 40px;
                max-width: 600px;
                margin: 40px auto;
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-dark);
        }

        .input,
        .select {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-family: inherit;
            font-size: 16px;
            background: var(--white);
        }

        .input:focus,
        .select:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        .error-message {
            color: var(--error);
            font-size: 13px;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }

        /* Footer */
        footer {
            background: var(--primary);
            color: var(--white);
            padding: 60px 0 30px;
            font-size: 14px;
            text-align: center;
        }

        .legal-text {
            opacity: 0.6;
            font-size: 12px;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>

<body>

    <header>
        Katary Renta Temporal
    </header>

    <section class="section">
        <div class="container">
            <div class="admin-container">
                <div class="text-center" style="margin-bottom: 30px;">
                    <h2>Panel de Registros</h2>
                    <p>Descarga de reportes en formato Excel</p>
                </div>

                <form onsubmit="handleDownload(event)">
                    <div class="form-group">
                        <label class="label">Fecha desde</label>
                        <input type="date" id="start_date" name="start_date" class="input" required>
                    </div>

                    <div class="form-group">
                        <label class="label">Fecha hasta</label>
                        <input type="date" id="end_date" name="end_date" class="input" required>
                        <div id="date-error" class="error-message">La fecha final no puede ser anterior a la fecha
                            inicial.</div>
                    </div>

                    <div class="form-group">
                        <label class="label">Tipo de registro</label>
                        <select name="report_type" class="select" required>
                            <option value="" disabled selected>Seleccione una opción</option>
                            <option value="tra">TRA</option>
                            <option value="conducta">Código de Conducta</option>
                            <option value="acompanantes">Acompañantes</option>
                        </select>
                    </div>

                    <button type="submit" id="submit-btn" class="btn">Descargar XLSX</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="logo" style="margin-bottom: 24px; font-weight: 700;">Katary Renta Temporal</div>
            <div class="legal-text">
                <p>&copy; 2025 Katary Renta Temporal. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        // Validation Logic
        const startDateInput = document.getElementById('start_date');
        const endDateInput = document.getElementById('end_date');
        const errorMessage = document.getElementById('date-error');
        const submitBtn = document.getElementById('submit-btn');

        function validateDates() {
            const start = startDateInput.value;
            const end = endDateInput.value;

            if (start && end) {
                if (new Date(end) < new Date(start)) {
                    errorMessage.style.display = 'block';
                    endDateInput.style.borderColor = 'var(--error)';
                    submitBtn.disabled = true;
                    return false;
                } else {
                    errorMessage.style.display = 'none';
                    endDateInput.style.borderColor = '#D1D5DB';
                    submitBtn.disabled = false;
                    return true;
                }
            }
            // If fields are empty, we don't show error yet (browser 'required' handles it on submit), 
            // but we ensure button is enabled so browser validation can trigger.
            // Actually, requirements say "Prevent selection if ...", so we rely on this.
            submitBtn.disabled = false;
            return true;
        }

        startDateInput.addEventListener('change', validateDates);
        endDateInput.addEventListener('change', validateDates);

        function handleDownload(event) {
            event.preventDefault();

            if (!validateDates()) return;

            const fechaInicio = document.getElementById('start_date').value;
            const fechaFin = document.getElementById('end_date').value;
            const tipo = document.querySelector('select[name="report_type"]').value;

            if (!tipo) {
                alert("Selecciona un tipo de registro");
                return;
            }

            descargar(tipo, fechaInicio, fechaFin);
        }
    </script>

<script src="js/downloads.js"></script>
</body>

</html>
